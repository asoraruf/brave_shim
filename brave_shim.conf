# Configurazione Server
server:
  host: "127.0.0.1"
  port: 8000

# Configurazione SSL/TLS
ssl:
  use_custom_ca: false
  ca_bundle_path: "/etc/ssl/certs/ca-certificates.crt"
  verify_ssl: true

# Logging
logging:
  file_path: "./log/brave_shim.log"
  level: "INFO"

# Parametri Anti-Ban e Cache
bot_protection:
  cache_expiration: 3600
  min_delay: 1.0
  max_delay: 2.5

# Impostazioni Ricerca
search:
  default_count: 10
  local_count: 5

